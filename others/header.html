<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  :root{
    --ink:#0a0a0a; --surface:#1a1a1a; --line:#2e2e2e;
    --accent:#00e15b; --on-accent:#06210f; --muted:#9a9a9a; --faint:#6b6b6b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--ink);}
  .banner{
    width:1600px;height:600px;position:relative;overflow:hidden;
    background:
      radial-gradient(1200px 600px at 88% -10%, rgba(0,225,91,.16), transparent 60%),
      radial-gradient(900px 500px at -5% 110%, rgba(31,168,115,.12), transparent 55%),
      var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:#fff;display:flex;flex-direction:column;justify-content:center;
    padding:0 96px;
  }
  /* subtle grid texture */
  .banner::before{
    content:"";position:absolute;inset:0;opacity:.06;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:48px 48px;mask-image:linear-gradient(180deg,#000,transparent 75%);
  }
  .row{display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
  .mark{
    width:54px;height:54px;border-radius:16px;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--accent),#1fa873);
    box-shadow:0 8px 30px rgba(0,225,91,.35);
  }
  .mark svg{width:30px;height:30px;}
  .eyebrow{font-size:20px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);font-weight:700;}
  .title{font-size:128px;line-height:1.02;font-weight:800;letter-spacing:-.03em;
    margin-top:18px;position:relative;z-index:1;}
  .title .dot{color:var(--accent);}
  .sub{font-size:36px;color:#e9e9e9;font-weight:500;margin-top:14px;
    max-width:1180px;position:relative;z-index:1;}
  .chips{display:flex;gap:14px;margin-top:40px;position:relative;z-index:1;}
  .chip{font-size:22px;font-weight:600;padding:12px 22px;border-radius:999px;
    border:1px solid var(--line);color:var(--muted);background:rgba(255,255,255,.02);}
  .chip.solid{background:var(--accent);color:var(--on-accent);border-color:transparent;}
  .foot{position:absolute;bottom:42px;left:96px;right:96px;display:flex;
    align-items:center;justify-content:space-between;z-index:1;
    color:var(--faint);font-size:22px;}
  .foot .url{color:var(--muted);font-weight:600;}
</style>
</head>
<body>
  <div class="banner">
    <div class="row">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#06210f" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span class="eyebrow">Lloyds Banking Group&nbsp;·&nbsp;CIB &amp; BCB</span>
    </div>

    <h1 class="title">Future RM<span class="dot">.</span></h1>
    <p class="sub">The next-generation Relationship Manager — an always-on intelligence
      engine that turns live signals into deals.</p>

    <div class="chips">
      <span class="chip solid">Concept demo</span>
      <span class="chip">Interactive clickthrough</span>
      <span class="chip">Desktop&nbsp;+&nbsp;mobile</span>
    </div>

    <div class="foot">
      <span class="url">kind-pond-09920f703.7.azurestaticapps.net</span>
      <span>Prototype · 2026</span>
    </div>
  </div>
</body>
</html>
